aid: levelset-com
name: Levelset
description: >-
  Levelset is a New Orleans-based construction payment software company that
  helps contractors, subcontractors, material suppliers, and equipment rental
  firms manage mechanics lien rights, preliminary notices, lien waivers, and
  payment compliance across all 50 U.S. states. The platform automates
  preliminary notice delivery, lien filing and release, conditional and
  unconditional lien waiver exchange, job and stakeholder research, and
  contractor payment-history monitoring, with deep state-by-state lien-law
  templates and deadline tracking. Founded as zlien in 2011 and rebranded to
  Levelset in 2018, the company was acquired by Procore Technologies for
  approximately $500 million in November 2021 and now operates as part of
  Procore's invoicing and payments suite. Customer-facing integrations exist
  with Procore, Sage, Viewpoint, Foundation, Acumatica, QuickBooks and other
  construction ERP and accounting platforms, but Levelset does not currently
  publish a self-serve public REST API, OpenAPI specification, SDKs, or a
  developer portal — integrations are delivered through partner-built
  connectors, the Procore Marketplace, and direct enterprise engagements with
  the Levelset integrations team. The Levelset GitHub organization is empty
  and developers.levelset.com / developer.levelset.com are not publicly
  reachable as of this profile date.
